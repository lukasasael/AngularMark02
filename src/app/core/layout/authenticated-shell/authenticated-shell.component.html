<!-- HEADER GLOBAL -->
<header>
  <mat-toolbar color="primary" class="toolbar">
    <img src="assets/logo.svg" alt="AP Clinical Center" class="logo" />

    <span class="spacer"></span>

    <button mat-stroked-button color="accent" (click)="logout()">
      <mat-icon>logout</mat-icon>
      Sair
    </button>
  </mat-toolbar>
</header>

<!-- LAYOUT PRINCIPAL -->
<mat-sidenav-container class="layout">
  <!-- SIDENAV (estreito) -->
  <mat-sidenav mode="side" opened class="sidenav">
    <mat-nav-list>
      <a
        mat-list-item
        routerLink="/"
        routerLinkActive="active-link"
        routerLinkActiveOptions="{exact: true}"
      >
        <mat-icon matListItemIcon>home</mat-icon>
        <span matListItemTitle>Início</span>
      </a>
      <a mat-list-item routerLink="/patients" routerLinkActive="active-link">
        <mat-icon matListItemIcon>people</mat-icon>
        <span matListItemTitle>Pacientes</span>
      </a>
      <a mat-list-item routerLink="/agenda" routerLinkActive="active-link">
        <mat-icon matListItemIcon>event</mat-icon>
        <span matListItemTitle>Agenda</span>
      </a>
      <a mat-list-item routerLink="/reports" routerLinkActive="active-link">
        <mat-icon matListItemIcon>bar_chart</mat-icon>
        <span matListItemTitle>Relatórios</span>
      </a>
      <a mat-list-item routerLink="/loja" routerLinkActive="disabled-link">
        <mat-icon matListItemIcon>shopping_cart</mat-icon>
        <span matListItemTitle>Loja</span>
      </a>
      <a mat-list-item routerLink="/settings" routerLinkActive="active-link" class="config">
        <mat-icon matListItemIcon>settings</mat-icon>
        <span matListItemTitle>Configurações</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <!-- CONTEÚDO -->
  <mat-sidenav-content>
    <app-breadcrumb></app-breadcrumb>
    <main class="content">
      <router-outlet></router-outlet>
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
